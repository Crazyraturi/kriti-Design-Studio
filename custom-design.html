    <header class="header">

    <main class="section stack reveal">
      <h1>Custom Design Appointment</h1>
      <form class="form">
        <input placeholder="Name" required />
        <input type="email" placeholder="Email" required />
        <input placeholder="Phone" required />
        <input placeholder="Occasion" required />
        <textarea rows="5" placeholder="Description" required></textarea>
        <label>Upload reference image <input type="file" accept="image/*" /></label>
        <button>Request Appointment</button>
      </form>
    </main>

    <script src="script.js"></script>
  </body>
